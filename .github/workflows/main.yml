name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          pwd
          ls -R

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t devops-app .
          else
            echo "No Dockerfile found, skipping build"
          fi
